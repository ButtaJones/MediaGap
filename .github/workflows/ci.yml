name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test
      # Flag high/critical dependency vulnerabilities on every push without failing the build
      # (continue-on-error surfaces them as an annotation; moderate/low are ignored).
      - name: Audit dependencies (high/critical)
        run: npm audit --audit-level=high
        continue-on-error: true
