<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaGap Banner</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1280px;
        height: 720px;
        margin: 0;
        overflow: hidden;
        background: #05080f;
        color: #f8fbff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .banner {
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        background:
          radial-gradient(circle at 17% 45%, rgba(24, 214, 237, 0.28), transparent 18%),
          radial-gradient(circle at 83% 24%, rgba(229, 160, 13, 0.22), transparent 24%),
          radial-gradient(circle at 62% 92%, rgba(24, 214, 237, 0.13), transparent 28%),
          linear-gradient(135deg, #04070d 0%, #08111e 43%, #05080f 100%);
      }

      .banner::before,
      .banner::after {
        position: absolute;
        content: "";
        pointer-events: none;
      }

      .banner::before {
        inset: 0;
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.62), transparent 42%),
          linear-gradient(0deg, rgba(0, 0, 0, 0.72), transparent 30%);
        z-index: 3;
      }

      .banner::after {
        left: 430px;
        bottom: 54px;
        width: 820px;
        height: 92px;
        border-radius: 999px;
        background: rgba(24, 214, 237, 0.16);
        filter: blur(24px);
        z-index: 2;
      }

      .noise {
        position: absolute;
        inset: 0;
        opacity: 0.18;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 58px 58px;
        mask-image: linear-gradient(90deg, transparent, #000 24%, #000 78%, transparent);
      }

      .brand {
        position: absolute;
        left: 72px;
        top: 206px;
        z-index: 4;
        display: grid;
        gap: 22px;
        width: 330px;
      }

      .logo-wrap {
        display: grid;
        place-items: center;
        width: 172px;
        height: 172px;
        border-radius: 42px;
        background:
          radial-gradient(circle at 50% 50%, rgba(24, 214, 237, 0.28), transparent 64%),
          rgba(255, 255, 255, 0.03);
        box-shadow:
          0 0 54px rgba(24, 214, 237, 0.34),
          0 34px 80px rgba(0, 0, 0, 0.5);
      }

      .logo-wrap img {
        width: 150px;
        height: 150px;
        border-radius: 34px;
        display: block;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 68px;
        line-height: 0.96;
        letter-spacing: 0;
      }

      p {
        max-width: 310px;
        color: rgba(248, 251, 255, 0.76);
        font-size: 22px;
        line-height: 1.32;
        font-weight: 700;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .chip {
        display: inline-flex;
        min-height: 32px;
        align-items: center;
        border: 1px solid rgba(24, 214, 237, 0.28);
        border-radius: 999px;
        background: rgba(24, 214, 237, 0.11);
        color: #b9f8ff;
        font-size: 13px;
        font-weight: 850;
        padding: 0 13px;
      }

      .desktop {
        position: absolute;
        right: -72px;
        top: 38px;
        z-index: 1;
        width: 850px;
        height: 516px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.13);
        border-radius: 18px;
        background: #07101e;
        box-shadow:
          0 54px 110px rgba(0, 0, 0, 0.72),
          0 0 0 10px rgba(255, 255, 255, 0.025);
      }

      .desktop::before {
        position: absolute;
        inset: 0;
        content: "";
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), transparent 28%);
        z-index: 2;
        pointer-events: none;
      }

      .desktop img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: 50% 0%;
        opacity: 0.96;
      }

      .phone {
        position: absolute;
        left: 375px;
        top: 250px;
        z-index: 4;
        width: 222px;
        height: 448px;
        overflow: hidden;
        border: 8px solid #0a0e17;
        border-radius: 38px;
        background: #07101e;
        box-shadow:
          0 42px 88px rgba(0, 0, 0, 0.68),
          0 0 0 1px rgba(255, 255, 255, 0.24),
          0 0 44px rgba(24, 214, 237, 0.18);
      }

      .phone::before {
        position: absolute;
        top: 10px;
        left: 50%;
        z-index: 3;
        width: 78px;
        height: 20px;
        border-radius: 999px;
        background: #080b12;
        content: "";
        transform: translateX(-50%);
      }

      .phone img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: 50% 0%;
      }

      .preview-strip {
        position: absolute;
        right: 0;
        bottom: 0;
        z-index: 4;
        width: 785px;
        height: 118px;
        background: linear-gradient(90deg, transparent, rgba(5, 8, 15, 0.9) 18%, rgba(5, 8, 15, 0.98));
        filter: blur(0.2px);
      }

      .glow-line {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 112px;
        z-index: 5;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(24, 214, 237, 0.6), transparent);
        opacity: 0.72;
      }
    </style>
  </head>
  <body>
    <main class="banner" aria-label="MediaGap product banner">
      <div class="noise"></div>

      <section class="brand">
        <div class="logo-wrap">
          <img src="../public/logo.png" alt="" />
        </div>
        <div>
          <h1>MediaGap</h1>
          <p>Find the movies your library is missing, then search the gaps visually.</p>
        </div>
        <div class="chips" aria-label="Integrations">
          <span class="chip">Plex</span>
          <span class="chip">TMDb</span>
          <span class="chip">NZBHydra</span>
        </div>
      </section>

      <figure class="desktop" aria-hidden="true">
        <img src="screenshot.png" alt="" />
      </figure>
      <figure class="phone" aria-hidden="true">
        <img src="mobile-screenshot.png" alt="" />
      </figure>
      <div class="preview-strip"></div>
      <div class="glow-line"></div>
    </main>
  </body>
</html>
